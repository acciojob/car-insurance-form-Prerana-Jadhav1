<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Insurance Registration</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="form-header">
            <h1>Car Insurance Registration</h1>
            <p>Secure your vehicle with the best insurance coverage</p>
        </div>

        <form method="POST" class="insurance-form">
            <!-- Name Field -->
            <div class="form-group">
                <label for="name">Name</label>
                <input 
                    type="text" 
                    id="name" 
                    placeholder="Enter your full name" 
                    required
                >
            </div>

            <!-- Email Field -->
            <div class="form-group">
                <label for="email">Email</label>
                <input 
                    type="email" 
                    id="email" 
                    placeholder="Enter your email address" 
                    required
                >
            </div>

            <!-- Gender Field -->
            <div class="form-group">
                <label>Gender</label>
                <div class="radio-group">
                    <div class="radio-item">
                        <input 
                            type="radio" 
                            id="male" 
                            name="gender" 
                            value="male" 
                            required
                        >
                        <label for="male">Male</label>
                    </div>
                    <div class="radio-item">
                        <input 
                            type="radio" 
                            id="female" 
                            name="gender" 
                            value="female" 
                            required
                        >
                        <label for="female">Female</label>
                    </div>
                    <div class="radio-item">
                        <input 
                            type="radio" 
                            id="other" 
                            name="gender" 
                            value="other" 
                            required
                        >
                        <label for="other">Other</label>
                    </div>
                </div>
            </div>

            <!-- Car Brands Field -->
            <div class="form-group">
                <label for="cars">Car Brands</label>
                <select id="cars">
                    <option value="">--Select a brand--</option>
                    <option value="BMW">BMW</option>
                    <option value="Audi">Audi</option>
                    <option value="Mercedez">Mercedez</option>
                </select>
            </div>

            <!-- Car Age Field -->
            <div class="form-group">
                <label for="carage">Car Age</label>
                <input 
                    type="number" 
                    id="carage" 
                    placeholder="Enter car age in years" 
                    required
                >
            </div>

            <!-- Date of Purchase Field -->
            <div class="form-group">
                <label for="dop">Date of Purchase (dop)</label>
                <input 
                    type="date" 
                    id="dop" 
                    required
                >
            </div>

            <!-- Password Field -->
            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    placeholder="Create a password" 
                    required
                >
            </div>

            <!-- Submit Button -->
            <div class="form-group">
                <button type="submit">Register Now</button>
            </div>
        </form>
    </div>
</body>
</html>
